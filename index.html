<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MultiTwitch TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
      color: #fff;
      font-family: sans-serif;
    }

    .container {
      box-sizing: border-box;
      padding: 5vh 5vw;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 3vh;
    }

    p {
      font-size: 1.4rem;
      margin-bottom: 3vh;
      max-width: 900px;
    }

    input {
      font-size: 2rem;
      padding: 1rem;
      width: 80vw;
      max-width: 900px;
      border: 2px solid #555;
      border-radius: 8px;
      background: #111;
      color: #fff;
    }

    button {
      font-size: 1.6rem;
      padding: 0.8rem 2.5rem;
      border: 0;
      border-radius: 8px;
      background: #444;
      color: #fff;
      cursor: pointer;
    }

    button:focus,
    input:focus {
      outline: 3px solid #0af;
      outline-offset: 3px;
    }

    #watchBtn {
      margin-top: 3vh;
      font-size: 1.8rem;
      padding: 1rem 3rem;
    }

    .hint {
      margin-top: 2vh;
      font-size: 1.2rem;
      color: #aaa;
    }

    .history-wrapper {
      width: 80vw;
      max-width: 900px;
      margin-top: 5vh;
      text-align: left;
    }

    .history-title {
      font-size: 1.4rem;
      margin-bottom: 1.5vh;
      color: #ccc;
    }

    .history-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .history-item-btn {
      display: block;
      width: 100%;
      text-align: left;
      margin-bottom: 0.8vh;
      padding: 0.8rem 1rem;
      font-size: 1.4rem;
      background: #222;
      border-radius: 6px;
      border: 1px solid #444;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-empty {
      font-size: 1.2rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MultiTwitch TV</h1>
    <p>
      Enter one or more Twitch channel names.<br>
      Use space or comma to separate them.
    </p>
    <input id="channelInput" type="text"
           placeholder="e.g. shroud tarik, summit1g">
    <button id="watchBtn">Watch</button>
    <div class="hint">
      Remote: OK = type / confirm &nbsp; | &nbsp; BACK = exit app
    </div>

    <div class="history-wrapper">
      <div class="history-title">Recent combinations</div>
      <ul id="historyList" class="history-list"></ul>
      <div id="historyEmpty" class="history-empty" style="display:none;">
        No history yet.
      </div>
    </div>
  </div>

  <script>
    var HISTORY_KEY = 'multitwitch_tv_history';
    var HISTORY_LIMIT = 4;

    function loadHistory() {
      try {
        var raw = localStorage.getItem(HISTORY_KEY);
        if (!raw) return [];
        var parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed;
      } catch (e) {
        console.log('Failed to load history:', e);
        return [];
      }
    }

    function saveHistory(list) {
      try {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
      } catch (e) {
        console.log('Failed to save history:', e);
      }
    }

    function addHistoryItem(comboString) {
      if (!comboString) return;
      var history = loadHistory();

      // Remove if already exists (we'll add it at the top)
      history = history.filter(function(item) {
        return item !== comboString;
      });

      history.unshift(comboString);

      if (history.length > HISTORY_LIMIT) {
        history = history.slice(0, HISTORY_LIMIT);
      }

      saveHistory(history);
      renderHistory();
    }

    function renderHistory() {
      var history = loadHistory();
      var list = document.getElementById('historyList');
      var empty = document.getElementById('historyEmpty');

      list.innerHTML = '';

      if (!history.length) {
        empty.style.display = 'block';
        return;
      } else {
        empty.style.display = 'none';
      }

      history.forEach(function(combo, index) {
        var li = document.createElement('li');
        var btn = document.createElement('button');
        btn.className = 'history-item-btn';
        btn.textContent = combo;
        btn.setAttribute('data-combo', combo);
        btn.addEventListener('click', function() {
          useHistoryCombo(combo);
        });
        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    function buildMultiTwitchUrlFromComboString(comboString) {
      if (!comboString) return null;
      var raw = comboString.trim();
      if (!raw) return null;

      var parts = raw.split(/[,\s]+/).filter(Boolean);

      var sanitized = parts.map(function (name) {
        return name.replace(/[^a-zA-Z0-9_]/g, '');
      }).filter(Boolean);

      if (!sanitized.length) {
        return null;
      }

      var path = sanitized.map(encodeURIComponent).join('/');
      return 'https://www.multitwitch.tv/' + path;
    }

    function buildMultiTwitchUrlFromInput() {
      var input = document.getElementById('channelInput');
      var comboString = (input.value || '').trim();
      return buildMultiTwitchUrlFromComboString(comboString);
    }

    function openMultiTwitchFromInput() {
      var input = document.getElementById('channelInput');
      var comboString = (input.value || '').trim();
      if (!comboString) return;

      var url = buildMultiTwitchUrlFromComboString(comboString);
      if (!url) return;

      // Save to history BEFORE navigating away
      addHistoryItem(comboString);

      window.location.href = url;
    }

    function useHistoryCombo(comboString) {
      var input = document.getElementById('channelInput');
      input.value = comboString;
      openMultiTwitchFromInput();
    }

    function onKeyDown(e) {
      // BACK key on Samsung TV
      if (e.keyCode === 10009) {
        try {
          tizen.application.getCurrentApplication().exit();
        } catch (err) {
          console.log('Exit failed:', err);
        }
      }

      // ENTER / OK
      if (e.keyCode === 13) {
        openMultiTwitchFromInput();
      }
    }

    window.onload = function () {
      var input = document.getElementById('channelInput');
      var button = document.getElementById('watchBtn');

      renderHistory();

      try {
        input.focus();
      } catch (e) {
        console.log('Focus failed:', e);
      }

      button.addEventListener('click', openMultiTwitchFromInput);
      document.addEventListener('keydown', onKeyDown);
    };
  </script>
</body>
</html>
