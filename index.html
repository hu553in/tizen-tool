<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MultiTwitch TV Wrapper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="launcher-view" class="container">
    <h1>MultiTwitch TV Wrapper</h1>
    <p>
      Enter one or more Twitch channel names.<br>
      Use space or comma to separate them.
    </p>
    <input id="channel-input" type="text" placeholder="e.g. kuzma671, dokenz">
    <button id="watch-btn">Watch</button>

    <div class="history-wrapper">
      <div class="history-title">Recent combinations</div>
      <ul id="history-list" class="history-list"></ul>
      <div id="history-empty" class="history-empty hidden">
        No history yet.
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
